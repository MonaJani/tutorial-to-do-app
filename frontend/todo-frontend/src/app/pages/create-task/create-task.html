<div class="min-h-screen flex flex-col bg-linear-to-br from-indigo-400 to bg-indigo-800  text-white">
     <header class="p-6 border-b border-gray-700">
        <h1 class="text-2xl font-bold">ToDo-App</h1>
        <nav class="flex justify-between w-full mt-2  px-8 py-4 bg-slate-900 text-white border-b border-slate-700  rounded-lg">
            <div class="flex gap-4 justify-between w-full ">
                <a routerLink="/tasks" class="hover:text-cyan-800 transition">Tasks</a>
            </div>
            <div class="flex gap-4 justify-between w-full">
                <a routerLink="/tasks/new" class="hover:text-cyan-800 transition">New Tasks</a>
            </div>
            <div class="flex gap-4 justify-between w-full">
                 <a routerLink="/" class="hover:text-cyan-800 transition">Log out</a>
            </div>              
       </nav>
    </header>

<main class="flex justify-center items-center min-h-screen">
 
 <div class="bg-indigo-900 p-8 rounded-lg shadow-lg w-200 mb-40 mt-10">

    <h1 class="text-2xl font-bold mb-6 text-center">Create Task</h1>

    <form class="space-y-5">
  
    <div class="flex items-center gap-4">
      <label class="mb-1 w-32 text-white text-sm">Name: </label>
      <input 
        type="text"
        placeholder="Enter task name"
        class="flex-1 px-4 py-2 rounded bg-fuchsia-200 text-black outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex items-center gap-4">
      <label class="w-32 mb-1 text-sm">Date:</label>
      <input 
        type="date"
        class="flex-1 px-4 py-2 rounded-lg bg-fuchsia-200 text-black outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex items-center gap-4">
      <label class="mb-1 w-32 text-sm  text-white">Priority: </label>
      <select
      class="flex-1 px-4 py-2 rounded-lg bg-fuchsia-200 text-black outline-none focus:ring-2 focus:ring-blue-500"
    >
      <option value="">Select priority</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
      </div>

    <div class="flex items-start gap-4">
      <label class="mb-1 w-32 pt-2 text-sm">Description: </label>
      <textarea
        rows="6"
        placeholder="Enter description"
        class="flex-1 px-4 py-3 rounded-lg bg-fuchsia-200 text-black outline-none focus:ring-2 focus:ring-blue-500 resize-none">
      </textarea>
      
    </div>
    
    <button class="w-50 block mx-auto items-center bg-fuchsia-900 py-2 rounded hover:bg-mauve-700 transition" type="submit">
      Create task
    </button>
   
    
    </form>
    </div>
    </main>
</div>
